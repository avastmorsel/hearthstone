<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hearthstone">
  <meta name="theme-color" content="#2A1F0F">
  <title>Hearthstone</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232A1F0F'/%3E%3Cpath d='M16 26 C16 26 8 20 10 14 C11 10 13 12 13 12 C12 9 15 5 16 4 C17 5 20 9 19 12 C19 12 21 10 22 14 C24 20 16 26 16 26Z' fill='%23C49A3C'/%3E%3Cpath d='M16 24 C16 24 10 19 12 14.5 C13 12 14 13 14 13 C13.5 11 15 8 16 7 C16 10 17.5 12 16.5 14 C18 12 18.5 12 18.5 12 C18.5 15 17 19 16 22Z' fill='%23F0C060' opacity='0.8'/%3E%3C/svg%3E">

  <!-- Home screen icon (inline SVG → data URI for self-containment) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%232A1F0F'/%3E%3Cpath d='M90 155 C90 155 45 120 55 85 C62 62 72 70 72 70 C68 55 80 32 90 28 C100 32 112 55 108 70 C108 70 118 62 125 85 C135 120 90 155 90 155Z' fill='%23C49A3C'/%3E%3Cpath d='M90 148 C90 148 52 116 62 86 C68 68 76 74 76 74 C73 62 83 42 90 38 C90 55 97 68 93 80 C100 66 102 66 102 66 C102 82 96 108 90 130Z' fill='%23F0C060' opacity='0.8'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { cursor: pointer; }

    /* ── Variables ─────────────────────────── */
    :root {
      --cream:       #F7F2E8;
      --parchment:   #EDE5D0;
      --card:        #FDFAF3;
      --ink:         #2A1F0F;
      --warm-gray:   #7A6A52;
      --border:      #D9CEBC;
      --terracotta:  #B85C3A;
      --terra-light: #D4826A;
      --sage:        #5C7A60;
      --sage-light:  #A8C5AB;
      --gold:        #C49A3C;
      --gold-dark:   #A07A2A;
      --sky:         #4A8BA8;
      --ff-display:  'Playfair Display', Georgia, serif;
      --ff-body:     'Lora', Georgia, serif;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Base ──────────────────────────────── */
    html { height: 100%; background: var(--cream); }
    body {
      height: 100%;
      font-family: var(--ff-body);
      font-size: 16px;
      color: var(--ink);
      background: var(--cream);
      overflow: hidden;
    }

    /* ── App Shell ─────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ────────────────────────────── */
    header {
      background: var(--ink);
      padding: calc(12px + var(--safe-top)) 18px 10px;
      flex-shrink: 0;
      position: relative;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }

    .wordmark-title {
      font-family: var(--ff-display);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .wordmark-sub {
      font-family: var(--ff-body);
      font-size: 0.74rem;
      color: var(--parchment);
      opacity: 0.55;
      font-style: italic;
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* Month navigator */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 5px 8px;
    }

    .month-nav button {
      background: none;
      border: none;
      color: var(--parchment);
      font-size: 1.1rem;
      padding: 2px 6px;
      opacity: 0.65;
      transition: opacity 0.15s;
      line-height: 1;
    }

    .month-nav button:hover { opacity: 1; }

    #monthLabel {
      font-family: var(--ff-display);
      font-size: 0.82rem;
      color: var(--cream);
      min-width: 108px;
      text-align: center;
      font-style: italic;
    }

    /* ── Bottom Nav ────────────────────────── */
    nav {
      display: flex;
      background: var(--ink);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-bottom: var(--safe-bottom);
      flex-shrink: 0;
    }

    nav button {
      flex: 1;
      background: none;
      border: none;
      color: var(--parchment);
      opacity: 0.45;
      padding: 9px 4px 7px;
      font-family: var(--ff-body);
      font-size: 0.7rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: opacity 0.15s, color 0.15s;
    }

    nav button svg { width: 20px; height: 20px; }

    nav button.active {
      opacity: 1;
      color: var(--gold);
    }

    /* ── Main ──────────────────────────────── */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 14px 20px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── Cards & Panels ────────────────────── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
    }

    /* ── Summary Banner ────────────────────── */
    .summary-banner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
    }

    .stat { text-align: center; }

    .stat-val {
      font-family: var(--ff-display);
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--warm-gray);
      margin-top: 3px;
    }

    .stat-divider {
      width: 1px;
      height: 32px;
      background: var(--border);
    }

    /* ── Chart ─────────────────────────────── */
    .chart-inner {
      padding: 14px 16px;
    }

    .panel-label {
      font-family: var(--ff-display);
      font-size: 0.78rem;
      font-style: italic;
      color: var(--warm-gray);
      margin-bottom: 12px;
    }

    .chart-wrap {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    #pieChart { flex-shrink: 0; }

    .chart-legend {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      color: var(--warm-gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Category Cards ────────────────────── */
    .section-eyebrow {
      font-family: var(--ff-display);
      font-size: 0.7rem;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--warm-gray);
      margin: 4px 2px 8px;
    }

    .cat-card {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
    }

    .cat-card:last-child { border-bottom: none; border-radius: 0 0 12px 12px; }
    .cat-card:first-child { border-radius: 12px 12px 0 0; }
    .cat-card:only-child  { border-radius: 12px; }
    .cat-card:active { background: var(--parchment); }

    .cat-icon { width: 38px; height: 38px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .cat-icon svg { width: 36px; height: 36px; }

    .cat-body { flex: 1; min-width: 0; }

    .cat-name {
      font-family: var(--ff-display);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .cat-amounts {
      font-size: 0.74rem;
      color: var(--warm-gray);
      margin-bottom: 5px;
    }

    .progress-track {
      height: 4px;
      background: var(--parchment);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
    }

    .fill-ok      { background: var(--sage); }
    .fill-warn    { background: var(--gold); }
    .fill-over    { background: var(--terracotta); }

    .cat-pct {
      font-family: var(--ff-display);
      font-size: 0.78rem;
      font-weight: 700;
      min-width: 34px;
      text-align: right;
    }

    .pct-ok   { color: var(--sage); }
    .pct-warn { color: var(--gold); }
    .pct-over { color: var(--terracotta); }

    /* ── Add Form ──────────────────────────── */
    .form-title {
      font-family: var(--ff-display);
      font-size: 1.15rem;
      font-style: italic;
      padding: 16px 18px 0;
    }

    .form-body { padding: 14px 18px 18px; }

    .form-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--warm-gray);
      margin-bottom: 5px;
    }

    input[type="number"],
    input[type="date"],
    input[type="text"],
    select {
      width: 100%;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
      font-family: var(--ff-body);
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input:focus, select:focus { border-color: var(--terracotta); }

    .amount-wrap { position: relative; }
    .amount-wrap::before {
      content: '$';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--warm-gray);
      font-family: var(--ff-display);
      pointer-events: none;
    }
    .amount-wrap input { padding-left: 22px; }

    /* Category picker grid */
    .cat-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .pick-btn {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 7px 4px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 0.67rem;
      color: var(--warm-gray);
      font-family: var(--ff-body);
      text-align: center;
      line-height: 1.2;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }

    .pick-btn svg { width: 26px; height: 26px; }

    .pick-btn.selected {
      border-color: var(--terracotta);
      background: rgba(184,92,58,0.06);
      color: var(--terracotta);
    }

    .btn-submit {
      width: 100%;
      background: var(--terracotta);
      color: var(--cream);
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-family: var(--ff-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }

    .btn-submit:hover { background: var(--terra-light); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── History ───────────────────────────── */
    .expense-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      border-bottom: 1px solid var(--border);
    }

    .expense-item:last-child { border-bottom: none; }

    .exp-icon { width: 30px; height: 30px; flex-shrink: 0; }
    .exp-icon svg { width: 30px; height: 30px; }

    .exp-body { flex: 1; min-width: 0; }

    .exp-cat {
      font-family: var(--ff-display);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .exp-desc {
      font-size: 0.78rem;
      color: var(--warm-gray);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .exp-date {
      font-size: 0.64rem;
      color: var(--warm-gray);
      opacity: 0.65;
    }

    .exp-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .exp-amount {
      font-family: var(--ff-display);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .btn-remove {
      background: none;
      border: 1px solid transparent;
      color: var(--warm-gray);
      font-size: 0.64rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--ff-body);
      opacity: 0.5;
      transition: all 0.15s;
    }

    .btn-remove:hover {
      opacity: 1;
      color: var(--terracotta);
      border-color: var(--terracotta);
    }

    /* ── Summary Report ────────────────────── */
    .report-header {
      background: var(--ink);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-bottom: 12px;
    }

    .report-month {
      font-family: var(--ff-display);
      font-size: 1.35rem;
      font-style: italic;
      color: var(--gold);
    }

    .report-sub {
      font-size: 0.68rem;
      color: var(--parchment);
      opacity: 0.5;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .report-stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      margin-top: 14px;
    }

    .rstat-val {
      font-family: var(--ff-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--cream);
    }

    .rstat-lbl {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--parchment);
      opacity: 0.55;
      margin-top: 2px;
    }

    .report-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 13px;
      border-bottom: 1px solid var(--border);
    }

    .report-row:last-child { border-bottom: none; }

    .rrow-icon { width: 24px; height: 24px; flex-shrink: 0; }
    .rrow-icon svg { width: 24px; height: 24px; }

    .rrow-name {
      flex: 1;
      font-family: var(--ff-display);
      font-size: 0.82rem;
    }

    .rrow-budget {
      font-size: 0.7rem;
      color: var(--warm-gray);
      min-width: 52px;
      text-align: right;
    }

    .rrow-spent {
      font-family: var(--ff-display);
      font-size: 0.88rem;
      font-weight: 700;
      min-width: 58px;
      text-align: right;
    }

    .rrow-ok   { color: var(--sage); }
    .rrow-over { color: var(--terracotta); }

    /* ── Utility States ────────────────────── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--warm-gray);
      font-style: italic;
      gap: 12px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--terracotta);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--warm-gray);
      font-style: italic;
      line-height: 1.7;
    }

    /* ── Toast ─────────────────────────────── */
    #toast {
      position: fixed;
      bottom: calc(66px + var(--safe-bottom) + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--ink);
      color: var(--cream);
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-family: var(--ff-body);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 999;
      white-space: nowrap;
      max-width: calc(100vw - 40px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Ornament ──────────────────────────── */
    .ornament {
      text-align: center;
      color: var(--gold);
      letter-spacing: 0.4em;
      font-size: 0.75rem;
      opacity: 0.55;
      margin: 10px 0 4px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-row">
      <div class="wordmark">
        <span class="wordmark-title">Hearthstone</span>
        <span class="wordmark-sub">household accounts</span>
      </div>
      <div class="month-nav">
        <button id="prevMonth" aria-label="Previous month">‹</button>
        <div id="monthLabel"></div>
        <button id="nextMonth" aria-label="Next month">›</button>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main id="main">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Setting the table…</span>
    </div>
  </main>

  <!-- Bottom navigation -->
  <nav>
    <button class="active" data-view="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Larder
    </button>
    <button data-view="add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Log
    </button>
    <button data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Ledger
    </button>
    <button data-view="summary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Report
    </button>
  </nav>

</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIGURATION
//  After deploying your Apps Script, paste its URL below.
// ══════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8QF3mdYdyPaCNooB5xvP5spqXbPiUdp4pk0EDPEbtFMP-CW0UCyd-uxh1btWnR2Z1rQ/exec';

// ══════════════════════════════════════════════════════════
//  CATEGORY REGISTRY
// ══════════════════════════════════════════════════════════
// Maps the display names used in the Sheet to icon keys.
const CAT_ID = {
  'Mortgage':       'mortgage',
  'Utilities':      'utilities',
  'Water & Sewer':  'water',
  'Internet':       'internet',
  'Gasoline':       'gasoline',
  'Tolls':          'tolls',
  'Student Debt':   'studentdebt',
  'Groceries':      'groceries',
  'Restaurant':     'restaurant',
  'Subscriptions':  'subscriptions',
  'Household':      'household',
  'Phones':         'phones',
  'Mazda CX-30':    'mazda',
  'Cocoa':          'dog',
  'Insurance':      'insurance',
};

const PIE_PALETTE = [
  '#B85C3A','#C49A3C','#5C7A60','#6B7AAB','#4A8BA8',
  '#C4704A','#7A9E7E','#A87A4A','#8B6DAB','#AB6B7A',
  '#7AAB6B','#AB8B4A','#4AAB8B','#8B4A6B','#6B8BAB',
];

// ══════════════════════════════════════════════════════════
//  SVG ICON LIBRARY
// ══════════════════════════════════════════════════════════
const ICONS = {

  mortgage: `<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="32" width="32" height="3" rx="0.5" fill="#7A6A52"/>
    <rect x="6" y="20" width="28" height="12" fill="#C4A882" stroke="#7A6A52" stroke-width="0.8"/>

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const state = {
  view:      'dashboard',
  month:     currentYM(),
  budget:    [],
  expenses:  [],
  selCat:    null,
};

function currentYM() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function fmtMonth(ym) {
  const [y, m] = ym.split('-');
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}

function fmtCur(n) {
  const v = parseFloat(n||0);
  return '$' + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}

function catId(name) { return CAT_ID[name] || 'household'; }

// ══════════════════════════════════════════════════════════
//  API (all GET to avoid CORS preflight)
// ══════════════════════════════════════════════════════════
async function api(params) {
  const url = new URL(SCRIPT_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return res.json();
}

async function loadAll() {
  showLoading();
  try {
    const [bRes, eRes] = await Promise.all([
      api({ action: 'getBudget' }),
      api({ action: 'getExpenses', month: state.month }),
    ]);
    state.budget   = bRes.data  || [];
    state.expenses = eRes.data  || [];
  } catch(e) {
    toast('Could not reach the ledger. Check your connection.');
  }
  render();
}

async function loadExpenses() {
  try {
    const res = await api({ action: 'getExpenses', month: state.month });
    state.expenses = res.data || [];
  } catch(e) { /* silent */ }
}

// ══════════════════════════════════════════════════════════
//  RENDER ROUTER
// ══════════════════════════════════════════════════════════
const main = document.getElementById('main');

function showLoading() {
  main.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Setting the table…</span></div>`;
}

function render() {
  if      (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'add')       renderAdd();
  else if (state.view === 'history')   renderHistory();
  else if (state.view === 'summary')   renderSummary();
}

// ── Dashboard ─────────────────────────────────────────────
function renderDashboard() {
  const spendMap = buildSpendMap();
  const totalBudget = state.budget.reduce((s,b) => s + parseFloat(b.MonthlyBudget||0), 0);
  const totalSpent  = Object.values(spendMap).reduce((a,b) => a+b, 0);
  const remaining   = totalBudget - totalSpent;
  const remColor    = remaining >= 0 ? 'var(--sage)' : 'var(--terracotta)';

  main.innerHTML = `
    <div class="panel summary-banner">
      <div class="stat">
        <div class="stat-val">${fmtCur(totalBudget)}</div>
        <div class="stat-lbl">Monthly Budget</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-val">${fmtCur(totalSpent)}</div>
        <div class="stat-lbl">Spent</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-val" style="color:${remColor}">${fmtCur(Math.abs(remaining))}</div>
        <div class="stat-lbl">${remaining >= 0 ? 'Remaining' : 'Over'}</div>
      </div>
    </div>

    <div class="panel">
      <div class="chart-inner">
        <div class="panel-label">Where the larder stands</div>
        <div class="chart-wrap">
          <canvas id="pieChart" width="130" height="130"></canvas>
          <div class="chart-legend" id="legend"></div>
        </div>
      </div>
    </div>

    <div class="section-eyebrow">The Pantry</div>
    <div class="panel" id="catList"></div>
  `;

  drawPie(spendMap, totalBudget, totalSpent);
  renderCatList(spendMap);
}

function buildSpendMap() {
  const m = {};
  state.expenses.forEach(e => {
    m[e.Category] = (m[e.Category]||0) + parseFloat(e.Amount||0);
  });
  return m;
}

function drawPie(spendMap, totalBudget, totalSpent) {
  const canvas = document.getElementById('pieChart');
  if (!canvas || !state.budget.length) return;
  const ctx = canvas.getContext('2d');
  const cx = 65, cy = 65, R = 56, hole = 28;

  const slices = state.budget.map((b,i) => ({
    name:   b.Category,
    budget: parseFloat(b.MonthlyBudget||0),
    color:  PIE_PALETTE[i % PIE_PALETTE.length],
  })).filter(s => s.budget > 0);

  const total = slices.reduce((s,sl) => s + sl.budget, 0);
  if (!total) return;

  let angle = -Math.PI / 2;
  slices.forEach(sl => {
    const sweep = (sl.budget / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, angle, angle + sweep);
    ctx.closePath();
    ctx.fillStyle = sl.color;
    ctx.fill();
    ctx.strokeStyle = '#F7F2E8';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    angle += sweep;
  });

  // Donut hole
  ctx.beginPath();
  ctx.arc(cx, cy, hole, 0, Math.PI * 2);
  ctx.fillStyle = '#FDFAF3';
  ctx.fill();

  // Center text
  const pct = totalBudget > 0 ? Math.round((totalSpent / totalBudget) * 100) : 0;
  ctx.fillStyle   = '#2A1F0F';
  ctx.font        = `bold 15px 'Playfair Display', Georgia, serif`;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${pct}%`, cx, cy - 5);
  ctx.font        = `9px 'Lora', Georgia, serif`;
  ctx.fillStyle   = '#7A6A52';
  ctx.fillText('spent', cx, cy + 9);

  // Legend
  const legend = document.getElementById('legend');
  if (legend) {
    legend.innerHTML = slices.slice(0,9).map(sl => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${sl.color}"></div>
        <span>${sl.name}</span>
      </div>`).join('');
  }
}

function renderCatList(spendMap) {
  const list = document.getElementById('catList');
  if (!list) return;
  list.innerHTML = state.budget.map(b => {
    const budget = parseFloat(b.MonthlyBudget||0);
    const spent  = spendMap[b.Category] || 0;
    const raw    = budget > 0 ? (spent / budget) * 100 : 0;
    const pct    = Math.min(raw, 100);
    const over   = raw > 100;
    const warn   = raw >= 80 && !over;
    const cls    = over ? 'over' : warn ? 'warn' : 'ok';
    const icon   = ICONS[catId(b.Category)] || ICONS.household;
    const qBadge = b.BillingType === 'quarterly'
      ? `<span style="font-size:0.6rem;opacity:0.55;font-style:italic"> · quarterly</span>` : '';
    return `
      <div class="cat-card" data-cat="${b.Category}">
        <div class="cat-icon">${icon}</div>
        <div class="cat-body">
          <div class="cat-name">${b.Category}</div>
          <div class="cat-amounts">${fmtCur(spent)} of ${fmtCur(budget)}${qBadge}</div>
          <div class="progress-track">
            <div class="progress-fill fill-${cls}" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="cat-pct pct-${cls}">${over?'+':''}${Math.round(raw)||0}%</div>
      </div>`;
  }).join('');

  list.querySelectorAll('.cat-card').forEach(card => {
    card.addEventListener('click', () => {
      state.selCat = card.dataset.cat;
      switchView('add');
    });
  });
}

// ── Add Expense ───────────────────────────────────────────
function renderAdd() {
  const today = new Date().toISOString().split('T')[0];

  main.innerHTML = `
    <div class="panel">
      <div class="form-title">Log an Expense</div>
      <div class="form-body">
        <div class="form-group">
          <label>Category</label>
          <div class="cat-picker" id="picker"></div>
        </div>
        <div class="form-group">
          <label>Amount</label>
          <div class="amount-wrap">
            <input type="number" id="fAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
          </div>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="fDate" value="${today}">
        </div>
        <div class="form-group">
          <label>Description <span style="opacity:0.5;font-size:0.8em">(optional)</span></label>
          <input type="text" id="fDesc" placeholder="What was this for?">
        </div>
        <button class="btn-submit" id="fSubmit">Record in the Ledger</button>
      </div>
    </div>`;

  let chosen = state.selCat || '';
  const picker = document.getElementById('picker');
  picker.innerHTML = state.budget.map(b => {
    const icon = ICONS[catId(b.Category)] || ICONS.household;
    return `<button class="pick-btn${b.Category===chosen?' selected':''}" data-cat="${b.Category}">${icon}${b.Category}</button>`;
  }).join('');

  picker.querySelectorAll('.pick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      picker.querySelectorAll('.pick-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      chosen = btn.dataset.cat;
    });
  });

  document.getElementById('fSubmit').addEventListener('click', async () => {
    const amount = parseFloat(document.getElementById('fAmount').value);
    const date   = document.getElementById('fDate').value;
    const desc   = document.getElementById('fDesc').value.trim();

    if (!chosen)       { toast('Choose a category first.'); return; }
    if (!amount || amount <= 0) { toast('Enter a valid amount.'); return; }
    if (!date)         { toast('Choose a date.'); return; }

    const btn = document.getElementById('fSubmit');
    btn.disabled    = true;
    btn.textContent = 'Recording…';

    try {
      await api({ action:'addExpense', category:chosen, amount, date, description:desc });
      state.selCat = null;
      toast('Logged to the ledger.');
      await loadExpenses();
      switchView('dashboard');
    } catch(e) {
      toast('Something went wrong. Try again.');
      btn.disabled    = false;
      btn.textContent = 'Record in the Ledger';
    }
  });
}

// ── History ───────────────────────────────────────────────
function renderHistory() {
  const sorted = [...state.expenses].sort((a,b) => new Date(b.Date) - new Date(a.Date));

  if (!sorted.length) {
    main.innerHTML = `<div class="empty-state">No entries yet for ${fmtMonth(state.month)}.<br><br>
      <span style="font-size:0.8rem">The larder is empty — which is either very good<br>or very concerning.</span></div>`;
    return;
  }

  main.innerHTML = `
    <div class="section-eyebrow">${sorted.length} entr${sorted.length===1?'y':'ies'} · ${fmtMonth(state.month)}</div>
    <div class="panel">
      ${sorted.map(e => {
        const icon = ICONS[catId(e.Category)] || ICONS.household;
        const d    = new Date(e.Date + 'T12:00:00');
        const ds   = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        return `
          <div class="expense-item">
            <div class="exp-icon">${icon}</div>
            <div class="exp-body">
              <div class="exp-cat">${e.Category}</div>
              <div class="exp-desc">${e.Description || '—'}</div>
              <div class="exp-date">${ds}</div>
            </div>
            <div class="exp-right">
              <div class="exp-amount">${fmtCur(e.Amount)}</div>
              <button class="btn-remove" data-id="${e.ID}">remove</button>
            </div>
          </div>`;
      }).join('')}
    </div>`;

  main.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Remove this entry from the ledger?')) return;
      btn.textContent = '…';
      try {
        await api({ action:'deleteExpense', id:btn.dataset.id });
        toast('Entry removed.');
        await loadExpenses();
        renderHistory();
      } catch(e) {
        toast('Could not remove. Try again.');
        btn.textContent = 'remove';
      }
    });
  });
}

// ── Summary ───────────────────────────────────────────────
function renderSummary() {
  const spendMap    = buildSpendMap();
  const totalBudget = state.budget.reduce((s,b) => s + parseFloat(b.MonthlyBudget||0), 0);
  const totalSpent  = Object.values(spendMap).reduce((a,b) => a+b, 0);
  const delta       = totalBudget - totalSpent;

  main.innerHTML = `
    <div class="report-header">
      <div class="report-month">${fmtMonth(state.month)}</div>
      <div class="report-sub">Monthly Summary</div>
      <div class="report-stats">
        <div>
          <div class="rstat-val">${fmtCur(totalBudget)}</div>
          <div class="rstat-lbl">Budget</div>
        </div>
        <div>
          <div class="rstat-val">${fmtCur(totalSpent)}</div>
          <div class="rstat-lbl">Spent</div>
        </div>
        <div>
          <div class="rstat-val" style="color:${delta>=0?'var(--sage-light)':'var(--terra-light)'}">${fmtCur(Math.abs(delta))}</div>
          <div class="rstat-lbl">${delta>=0?'Saved':'Over'}</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="report-row" style="background:var(--parchment);border-radius:12px 12px 0 0;">
        <div style="width:24px"></div>
        <div style="flex:1;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--warm-gray)">Category</div>
        <div style="min-width:52px;text-align:right;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--warm-gray)">Budget</div>
        <div style="min-width:58px;text-align:right;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--warm-gray)">Spent</div>
      </div>
      ${state.budget.map(b => {
        const spent = spendMap[b.Category] || 0;
        const over  = spent > parseFloat(b.MonthlyBudget||0);
        const icon  = ICONS[catId(b.Category)] || ICONS.household;
        return `
          <div class="report-row">
            <div class="rrow-icon">${icon}</div>
            <div class="rrow-name">${b.Category}</div>
            <div class="rrow-budget">${fmtCur(b.MonthlyBudget)}</div>
            <div class="rrow-spent ${over?'rrow-over':'rrow-ok'}">${fmtCur(spent)}</div>
          </div>`;
      }).join('')}
    </div>

    <div class="ornament">— ✦ —</div>
  `;
}

// ══════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════
function switchView(v) {
  state.view = v;
  document.querySelectorAll('nav button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === v);
  });
  render();
}

document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

document.getElementById('prevMonth').addEventListener('click', () => {
  const [y,m] = state.month.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  state.month = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('monthLabel').textContent = fmtMonth(state.month);
  loadAll();
});

document.getElementById('nextMonth').addEventListener('click', () => {
  const [y,m] = state.month.split('-').map(Number);
  const d = new Date(y, m, 1);
  state.month = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('monthLabel').textContent = fmtMonth(state.month);
  loadAll();
});

document.getElementById('monthLabel').textContent = fmtMonth(state.month);

// ══════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════
loadAll();
</script>
</body>
</html>
